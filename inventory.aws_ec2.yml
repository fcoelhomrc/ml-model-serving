plugin: amazon.aws.aws_ec2
regions:
  - eu-north-1
filters:
  tag:Name: ml-model-serving
  instance-state-name: running
hostnames:
  - ip-address
compose:
  ansible_user: "'ec2-user'"
  ansible_ssh_private_key_file: "'~/.ssh/ml-model-serving'"
  ansible_ssh_common_args: "'-o StrictHostKeyChecking=no'"
groups:
  app_servers: "true"
