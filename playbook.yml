---
- name: Configure ML model serving instance
  hosts: app_servers
  become: true

  tasks:
    - name: Wait for SSH to be ready
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Gather facts
      ansible.builtin.setup:

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Install Docker Compose plugin
      ansible.builtin.dnf:
        name: docker-compose-plugin
        state: present

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Clone repository
      ansible.builtin.git:
        repo: https://github.com/fcoelhomrc/ml-model-serving.git
        dest: /opt/app
        version: main
        force: true

    - name: Run docker compose up
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/app
